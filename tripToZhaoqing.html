<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>girls' party</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <script>
        window._AMapSecurityConfig = {
            securityJsCode: "77325b4104e29231e02f6409111e0154"
        }
    </script>
    <script src="https://webapi.amap.com/maps?v=2.0&key=a0e0d51493befe15cf42b93f9d6359e1"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body,
        html {
            width: 100%;
            height: 100%;
            font-family: 'Noto Serif SC', serif;
            overflow: hidden;
            background-color: #f4efd3;
        }

        #map {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* 移动端地图 Marker 按键化 */
        .custom-map-marker {
            background: #fdfbf7;
            border: 2px solid #d4c4a8;
            border-radius: 20px;
            padding: 6px 12px;
            color: #3e2723;
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            box-shadow: 0 4px 10px rgba(62, 39, 35, 0.2);
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
            position: relative;
        }

        .custom-map-marker::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-top: 6px solid #fdfbf7;
        }

        .custom-map-marker::before {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 8px solid #d4c4a8;
            z-index: -1;
        }

        .custom-map-marker.active {
            background: #8b3a3a;
            color: #fdfbf7;
            border-color: #8b3a3a;
            transform: scale(1.1);
            z-index: 999 !important;
        }

        .custom-map-marker.active::after {
            border-top-color: #8b3a3a;
        }

        .custom-map-marker.active .marker-icon {
            background: #d4af37;
        }

        .marker-icon {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #8b3a3a;
        }

        /* 移动端底部信息卡片 (Drawer) */
        .bottom-card {
            position: absolute;
            bottom: -150%;
            left: 0;
            width: 100%;
            background: rgba(253, 251, 247, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px 20px 0 0;
            padding: 24px 20px 32px 20px;
            box-shadow: 0 -5px 25px rgba(62, 39, 35, 0.2);
            transition: bottom 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 1000;
            border-top: 2px solid #8b3a3a;
        }

        .bottom-card.open {
            bottom: 0;
        }

        .card-drag-handle {
            width: 40px;
            height: 4px;
            background: #d4c4a8;
            border-radius: 2px;
            margin: 0 auto 16px auto;
        }

        .card-title {
            font-size: 20px;
            color: #8b3a3a;
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-index {
            font-size: 14px;
            background: #d4af37;
            color: #fff;
            padding: 2px 8px;
            border-radius: 12px;
            font-weight: 600;
        }

        .card-note {
            font-size: 15px;
            color: #5d4037;
            line-height: 1.6;
            margin-top: 12px;
            background: rgba(212, 196, 168, 0.2);
            padding: 12px 16px;
            border-radius: 8px;
            border-left: 4px solid #c28135;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 24px;
            height: 24px;
            background: #eeeae0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #8b3a3a;
            font-weight: bold;
        }

        /* 隐藏高德地图默认放大缩小控件（移动端手势即可） */
        .amap-controls {
            display: none !important;
        }
    </style>
</head>

<body>

    <div id="map"></div>

    <!-- 底部详情卡片 -->
    <div class="bottom-card" id="bottomCard">
        <div class="card-drag-handle"></div>
        <div class="close-btn" onclick="closeCard()">✕</div>
        <div class="card-title">
            <span id="cardName">景点名称</span>
            <span class="card-index" id="cardIndex">#1</span>
        </div>
        <div class="card-note" id="cardNote">这里是备注文案这里是备注文案这里是备注文案</div>
    </div>

    <script>
        const routeData = [
            { name: "蔃女食馆", note: "排队比较久的话可以放弃", lnglat: [112.477606, 23.047345] },
            { name: "肥姨鱼蛋", note: "肥姨鱼蛋要双拼，但是不要抱太大期待，预期是网红口味", lnglat: [112.464853, 23.049613] },
            { name: "朝天门", note: "从这里上城墙", lnglat: [112.464346, 23.048849] },
            { name: "古城墙", note: "", lnglat: [112.461428, 23.048992] },
            { name: "肇庆博物馆", note: "去上课的", lnglat: [112.464826, 23.048075] },
            { name: "骑楼街", note: "有臭豆腐、牛杂，一条有点特色的美食街", lnglat: [112.467551, 23.045939] },
            { name: "西江", note: "看日落", lnglat: [112.466000, 23.042500] },
            { name: "古城墙南段", note: "", lnglat: [112.463500, 23.046500] },
            { name: "味道王小食店", note: "广式茶点，猪杂粥，韭菜猪肉饺子", lnglat: [112.461354, 23.046976] },
            { name: "丽谯楼", note: "", lnglat: [112.459150, 23.047198] },
            { name: "披云楼", note: "", lnglat: [112.459263, 23.049094] }
        ];

        const map = new AMap.Map('map', {
            zoom: 16.5,
            center: [112.463000, 23.047000],
            viewMode: '2D',
            mapStyle: 'amap://styles/whitesmoke',
            features: ['bg', 'road', 'building'],
        });

        let activeMarkerDom = null;

        function closeCard() {
            document.getElementById('bottomCard').classList.remove('open');
            if (activeMarkerDom) {
                activeMarkerDom.classList.remove('active');
            }
            // 恢复视图居中（可选）
        }

        map.on('complete', function () {
            const pathLngLats = routeData.map(item => item.lnglat);

            const routeLine = new AMap.Polyline({
                path: pathLngLats,
                isOutline: true,
                outlineColor: '#fdfbf7',
                borderWeight: 2,
                strokeColor: "#c28135",
                strokeOpacity: 0.9,
                strokeWeight: 5, // 移动端稍微细一点更清爽
                strokeStyle: "solid",
                lineJoin: 'round',
                lineCap: 'round',
                showDir: true,
                dirColor: "#ffffff",
                zIndex: 50,
            });
            map.add(routeLine);

            const cityWallPath = [
                [112.4592, 23.0495], [112.4620, 23.0492],
                [112.4645, 23.0498], [112.4655, 23.0475],
                [112.4640, 23.0460], [112.4610, 23.0465],
                [112.4588, 23.0470], [112.4592, 23.0495]
            ];

            const wallPolygon = new AMap.Polygon({
                path: cityWallPath,
                strokeColor: "#8b3a3a",
                strokeWeight: 2, // 移动端线条稍细
                strokeOpacity: 0.8,
                fillOpacity: 0.08,
                fillColor: '#8b3a3a',
                zIndex: 10,
                strokeStyle: 'dashed'
            });
            map.add(wallPolygon);

            routeData.forEach((item, index) => {
                // 移动端不再直接在地图上显示又长又占位置的文字了
                // 只显示序号和地名
                const markerContent = `
                    <div class="custom-map-marker" id="marker-${index}">
                        <div class="marker-icon"></div>
                        <span>${index + 1}. ${item.name}</span>
                    </div>
                `;

                const marker = new AMap.Marker({
                    position: item.lnglat,
                    content: markerContent,
                    offset: new AMap.Pixel(-30, -30), // 偏移调整适应短文本
                    zIndex: 100 + index
                });

                marker.on('click', () => {
                    // 取消之前激活的图标
                    if (activeMarkerDom) {
                        activeMarkerDom.classList.remove('active');
                    }

                    // 激活当前点击的图标
                    const currentDom = document.getElementById(`marker-${index}`);
                    if (currentDom) {
                        currentDom.classList.add('active');
                        activeMarkerDom = currentDom;
                    }

                    // 移动端核心：将地图中心平滑移到该点稍上方的位置（留出下面卡片的空间）
                    // 简单的偏移计算
                    const targetLng = item.lnglat[0];
                    const targetLat = item.lnglat[1] + 0.0015; // 纬度上移，让目标点在屏幕上半部分
                    map.panTo([targetLng, targetLat]);

                    // 弹出底部信息面板
                    document.getElementById('cardName').innerText = item.name;
                    document.getElementById('cardIndex').innerText = `NO. ${index + 1}`;

                    const noteEl = document.getElementById('cardNote');
                    if (item.note) {
                        noteEl.style.display = 'block';
                        noteEl.innerText = item.note;
                    } else {
                        noteEl.style.display = 'none';
                    }

                    document.getElementById('bottomCard').classList.add('open');
                });

                map.add(marker);
            });

            // 点击地图空白处关闭卡片
            map.on('click', () => {
                closeCard();
            });

            map.setFitView([routeLine, ...map.getAllOverlays('Marker')], false, [40, 40, 40, 40]);
        });
    </script>
</body>

</html>
