<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="referrer" content="no-referrer">
    <title>girls' party</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <script>
        window._AMapSecurityConfig = {
            securityJsCode: "77325b4104e29231e02f6409111e0154"
        }
    </script>
    <script src="https://webapi.amap.com/maps?v=2.0&key=a0e0d51493befe15cf42b93f9d6359e1"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body,
        html {
            width: 100%;
            height: 100%;
            font-family: 'Noto Serif SC', serif;
            overflow: hidden;
            background-color: #f4efd3;
        }

        #map {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* 移动端地图 Marker 按键化 */
        .custom-map-marker {
            background: #fdfbf7;
            border: 2px solid #d4c4a8;
            border-radius: 20px;
            padding: 6px 12px;
            color: #3e2723;
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            box-shadow: 0 4px 10px rgba(62, 39, 35, 0.2);
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
            position: relative;
        }

        .custom-map-marker::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-top: 6px solid #fdfbf7;
        }

        .custom-map-marker::before {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 8px solid #d4c4a8;
            z-index: -1;
        }

        .custom-map-marker.active {
            background: #8b3a3a;
            color: #fdfbf7;
            border-color: #8b3a3a;
            transform: scale(1.1);
            z-index: 999 !important;
        }

        .custom-map-marker.active::after {
            border-top-color: #8b3a3a;
        }

        .custom-map-marker.active .marker-icon {
            background: #d4af37;
        }

        .marker-icon {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #8b3a3a;
        }

        /* 悬浮气泡框样式 (InfoWindow) */
        .custom-info-window {
            background: rgba(253, 251, 247, 0.98);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 2px solid #8b3a3a;
            border-radius: 12px;
            padding: 16px;
            width: 260px; /* 适合移动端的对话框宽度 */
            box-shadow: 0 10px 25px rgba(62, 39, 35, 0.25);
            position: relative;
            transform: translateY(-5px); /* 微调位置，避免遮挡地标 */
        }

        .custom-info-window::after {
            content: '';
            position: absolute;
            bottom: -11px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 10px solid #8b3a3a;
        }

        .custom-info-window::before {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 8px solid rgba(253, 251, 247, 0.98);
            z-index: 1;
        }

        .info-close-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 24px;
            height: 24px;
            background: #eeeae0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #8b3a3a;
            font-weight: bold;
            cursor: pointer;
            z-index: 2;
        }

        .info-title {
            font-size: 18px;
            color: #8b3a3a;
            font-weight: 700;
            margin-bottom: 8px;
            padding-right: 20px;
        }

        .info-note {
            font-size: 13px;
            color: #5d4037;
            line-height: 1.5;
            background: rgba(212, 196, 168, 0.2);
            padding: 8px 10px;
            border-radius: 6px;
            border-left: 3px solid #c28135;
            margin-top: 8px;
            max-height: 120px;
            overflow-y: auto;
        }

        .info-image {
            width: 100%;
            height: 140px;
            object-fit: cover;
            border-radius: 8px;
            margin-top: 12px;
            border: 1px solid #d4c4a8;
        }

        /* 自定义滚动条风格 */
        .info-note::-webkit-scrollbar {
            width: 4px;
        }
        .info-note::-webkit-scrollbar-thumb {
            background-color: #d4c4a8;
            border-radius: 2px;
        }

        /* 隐藏高德地图默认放大缩小控件 */
        .amap-controls {
            display: none !important;
        }
    </style>
</head>

<body>

    <div id="map"></div>

    <script>
        const routeData = [
            { name: "蔃女食馆", note: "排队比较久的话可以放弃", lnglat: [112.477606, 23.047345], image: "https://cdn.nlark.com/yuque/0/2026/jpeg/28536210/1777029744054-b5130702-850e-4746-9108-265af6187c7f.jpeg" },
            { name: "肥姨鱼蛋", note: "肥姨鱼蛋要双拼，但是不要抱太大期待，预期是网红口味", lnglat: [112.464853, 23.049613], image: "https://cdn.nlark.com/yuque/0/2026/jpeg/28536210/1777029751190-82385440-a20a-4e8b-b17b-cc7018d1459b.jpeg" },
            { name: "朝天门", note: "从这里上城墙", lnglat: [112.464346, 23.048849], image: "https://cdn.nlark.com/yuque/0/2026/jpeg/28536210/1777029755952-e417593f-6bf6-4f71-b7f6-44f8ccde85e1.jpeg" },
            { name: "古城墙", note: "", lnglat: [112.461428, 23.048992] },
            { name: "肇庆博物馆", note: "去上课的", lnglat: [112.464826, 23.048075] },
            { name: "骑楼街", note: "有臭豆腐、牛杂，一条有点特色的美食街", lnglat: [112.467551, 23.045939], image: "https://cdn.nlark.com/yuque/0/2026/jpeg/28536210/1777029760432-66279268-93ba-4526-a70c-8d40ba75bd6d.jpeg" },
            { name: "西江", note: "看日落", lnglat: [112.466000, 23.042500], image: "https://cdn.nlark.com/yuque/0/2026/jpeg/28536210/1777029765187-a2bf1989-c825-4036-a6a2-9e9354d45d70.jpeg" }, // 在骑楼街之后插入，南下直达江边观景
            { name: "古城墙南段", note: "", lnglat: [112.463500, 23.046500] },
            { name: "味道王小食店", note: "广式茶点，猪杂粥，韭菜猪肉饺子", lnglat: [112.461354, 23.046976] },
            { name: "丽谯楼", note: "", lnglat: [112.459150, 23.047198] },
            { name: "披云楼", note: "", lnglat: [112.459263, 23.049094], image: "https://cdn.nlark.com/yuque/0/2026/jpeg/28536210/1777029769152-b8795bbe-1f49-4088-aefa-3e91676f7cf5.jpeg" }
        ];

        const map = new AMap.Map('map', {
            zoom: 16.5,
            center: [112.463000, 23.047000],
            viewMode: '2D',
            mapStyle: 'amap://styles/whitesmoke',
            features: ['bg', 'road', 'building'],
        });

        let activeMarkerDom = null;
        
        // 全局关闭浮窗方法
        window.closeInfoWindow = function() {
            map.clearInfoWindow();
            if (activeMarkerDom) {
                activeMarkerDom.classList.remove('active');
                activeMarkerDom = null;
            }
        }

        map.on('complete', function () {
            const pathLngLats = routeData.map(item => item.lnglat);

            const routeLine = new AMap.Polyline({
                path: pathLngLats,
                isOutline: true,
                outlineColor: '#fdfbf7',
                borderWeight: 2,
                strokeColor: "#c28135",
                strokeOpacity: 0.9,
                strokeWeight: 5, // 移动端稍微细一点更清爽
                strokeStyle: "solid",
                lineJoin: 'round',
                lineCap: 'round',
                showDir: true,
                dirColor: "#ffffff",
                zIndex: 50,
            });
            map.add(routeLine);

            const cityWallPath = [
                [112.4592, 23.0495], [112.4620, 23.0492],
                [112.4645, 23.0498], [112.4655, 23.0475],
                [112.4640, 23.0460], [112.4610, 23.0465],
                [112.4588, 23.0470], [112.4592, 23.0495]
            ];

            const wallPolygon = new AMap.Polygon({
                path: cityWallPath,
                strokeColor: "#8b3a3a",
                strokeWeight: 2, // 移动端线条稍细
                strokeOpacity: 0.8,
                fillOpacity: 0.08,
                fillColor: '#8b3a3a',
                zIndex: 10,
                strokeStyle: 'dashed'
            });
            map.add(wallPolygon);
            
            // 初始化复用同一个信息窗体 (InfoWindow)
            const infoWindow = new AMap.InfoWindow({
                isCustom: true, // 使用自定义 HTML
                offset: new AMap.Pixel(0, -35) // 让信息框出现在图标正上方（不遮挡）
            });

            routeData.forEach((item, index) => {
                const markerContent = `
                    <div class="custom-map-marker" id="marker-${index}">
                        <div class="marker-icon"></div>
                        <span>${index + 1}. ${item.name}</span>
                    </div>
                `;

                const marker = new AMap.Marker({
                    position: item.lnglat,
                    content: markerContent,
                    offset: new AMap.Pixel(-30, -15), // 图标本身中心偏移定位
                    zIndex: 100 + index
                });

                marker.on('click', () => {
                    // 取消之前激活的图标
                    if (activeMarkerDom) {
                        activeMarkerDom.classList.remove('active');
                    }

                    // 激活当前点击的图标
                    const currentDom = document.getElementById(`marker-${index}`);
                    if (currentDom) {
                        currentDom.classList.add('active');
                        activeMarkerDom = currentDom;
                    }

                    // 构建自定义弹窗的内部 HTML (包含标题文本图片)
                    const infoHtml = `
                    <div class="custom-info-window">
                        <div class="info-close-btn" onclick="window.closeInfoWindow()">✕</div>
                        <div class="info-title">NO.${index + 1} &nbsp;${item.name}</div>
                        ${item.note ? `<div class="info-note">${item.note}</div>` : ''}
                        ${item.image ? `<img class="info-image" src="${item.image}" alt="景点图片" />` : ''}
                    </div>
                    `;

                    // 高德原生特性：在点位正上方弹起对话框
                    infoWindow.setContent(infoHtml);
                    infoWindow.open(map, item.lnglat);

                    // 视线依然平滑居中且微调，把上方预留给图文框
                    const targetLng = item.lnglat[0];
                    const targetLat = item.lnglat[1] + (item.image ? 0.0015 : 0.0008); 
                    map.panTo([targetLng, targetLat]);
                });

                map.add(marker);
            });

            // 点击地图空白处，原生接口即可清空窗体
            map.on('click', () => {
                window.closeInfoWindow();
            });

            map.setFitView([routeLine, ...map.getAllOverlays('Marker')], false, [40, 40, 40, 40]);
        });
    </script>
</body>

</html>
